name: TaobaoApp
options:
  bundleIdPrefix: com.taobao
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: 淘宝
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  TaobaoApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/TaobaoApp
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Resources
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.taobao.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - TaobaoAppTests
      gatherCoverageData: true

  TaobaoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        optional: true
    dependencies:
      - target: TaobaoApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taobao.app.tests
