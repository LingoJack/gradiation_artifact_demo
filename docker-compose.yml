services:
  mysql:
    image: mysql:8.0
    container_name: proj_template_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proj_template_backend
    environment:
      APP_DATABASE_DSN: appuser:apppassword@tcp(mysql:3306)/appdb?charset=utf8mb4&parseTime=True&loc=Local
      APP_LOG_LEVEL: info
      APP_LOG_FORMAT: json
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proj_template_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
